server:
  port: 8081
spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  application:
    name: hmdp
  rabbitmq:
    host: 192.168.220.128
    port: 5672
    username: hmall
    password: 123321
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual #开起手动消息确认模式
        retry:
          enabled: true #开启重试机制
          max-attempts: 3 #最多重试三次
          initial-interval: 1000 #初始间隔1秒
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/heimadianping?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true&useSSL=true
    username: root
    password: '5446786HYQ'
  redis:
    host: 192.168.220.128
    port: 6379
    password: '123456'
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段

mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug
    org.springframework.data.redis: DEBUG
    io.lettuce.core: DEBUG
